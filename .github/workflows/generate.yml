name: Generate Proto

on:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Generate Go code
        run: |
          mkdir -p out/order/v1 out/payment/v1
          protoc --proto_path=. \
            --go_out=out --go_opt=paths=source_relative \
            --go-grpc_out=out --go-grpc_opt=paths=source_relative \
            order/v1/order.proto payment/v1/payment.proto

      - name: Push to ap2-generated
        run: |
          git clone https://x-access-token:${{ secrets.GEN_TOKEN }}@github.com/nurashi/ap2-generated.git gen-repo
          cp -r out/* gen-repo/
          cd gen-repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add .
          git diff --staged --quiet || git commit -m "chore: regenerate from protos"
          git push
